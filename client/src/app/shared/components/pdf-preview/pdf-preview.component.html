<div class="w-full h-full bg-white rounded-2xl overflow-hidden flex flex-col">
  <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
    <div>
      <h2 class="font-bold text-slate-800">{{ data.title }}</h2>
      <p class="text-xs text-slate-400">PDF Preview</p>
    </div>

    <button
      type="button"
      (click)="close()"
      class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-500">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="flex-1 bg-slate-100">
    <iframe
      [src]="data.pdfUrl"
      class="w-full h-[80vh] border-0">
    </iframe>
  </div>
</div>
