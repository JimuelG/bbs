<div class="p-6 bg-white rounded-lg max-w-md">
  <div class="flex justify-between items-center border-b pb-4 mb-6">
    <div class="flex items-center space-x-2 text-amber-600">
      <span class="material-icons">lock_reset</span>
      <h2 class="text-xl font-bold text-gray-800">Change Password</h2>
    </div>
    <button (click)="onCancel()" class="text-gray-400 hover:text-gray-600">
      <span class="material-icons">close</span>
    </button>
  </div>

  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="space-y-5">
    
    <div class="flex flex-col">
      <label class="text-sm font-semibold text-gray-700 mb-1">Current Password</label>
      <div class="relative">
        <input [type]="hideCurrent ? 'password' : 'text'" 
               formControlName="currentPassword"
               class="w-full p-2.5 border rounded-lg pr-10 focus:ring-2 focus:ring-blue-500 outline-none border-gray-300">
        <button type="button" (click)="hideCurrent = !hideCurrent" 
                class="absolute right-2 top-2.5 text-gray-400 hover:text-gray-600">
          <span class="material-icons text-sm">{{ hideCurrent ? 'visibility_off' : 'visibility' }}</span>
        </button>
      </div>
    </div>

    <hr class="border-gray-100">

    <div class="flex flex-col">
      <label class="text-sm font-semibold text-gray-700 mb-1">New Password</label>
      <div class="relative">
        <input [type]="hideNew ? 'password' : 'text'" 
               formControlName="newPassword"
               class="w-full p-2.5 border rounded-lg pr-10 focus:ring-2 focus:ring-blue-500 outline-none border-gray-300">
        <button type="button" (click)="hideNew = !hideNew" 
                class="absolute right-2 top-2.5 text-gray-400 hover:text-gray-600">
          <span class="material-icons text-sm">{{ hideNew ? 'visibility_off' : 'visibility' }}</span>
        </button>
      </div>
      <p class="text-[10px] text-gray-500 mt-1">Must be at least 8 characters with a mix of letters and numbers.</p>
    </div>

    <div class="flex flex-col">
      <label class="text-sm font-semibold text-gray-700 mb-1">Confirm New Password</label>
      <div class="relative">
        <input [type]="hideConfirm ? 'password' : 'text'" 
               formControlName="confirmPassword"
               class="w-full p-2.5 border rounded-lg pr-10 focus:ring-2 focus:ring-blue-500 outline-none border-gray-300"
               [ngClass]="{'border-red-500': passwordForm.hasError('mismatch') && passwordForm.get('confirmPassword')?.touched}">
        <button type="button" (click)="hideConfirm = !hideConfirm" 
                class="absolute right-2 top-2.5 text-gray-400 hover:text-gray-600">
          <span class="material-icons text-sm">{{ hideConfirm ? 'visibility_off' : 'visibility' }}</span>
        </button>
      </div>
      @if (passwordForm.hasError('mismatch') && passwordForm.get('confirmPassword')?.touched) {
        <p class="text-xs text-red-500 mt-1">Passwords do not match.</p>
      }
    </div>

    <div class="flex flex-col space-y-3 mt-8">
      <button type="submit" 
              [disabled]="passwordForm.invalid || loading"
              class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-md transition disabled:opacity-50">
        {{ loading ? 'Updating Password...' : 'Update Password' }}
      </button>
      <button type="button" (click)="onCancel()" 
              class="w-full py-2 text-gray-500 hover:text-gray-700 font-medium transition">
        Cancel
      </button>
    </div>
  </form>
</div>
