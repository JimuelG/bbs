<div class="p-6 bg-white rounded-lg max-w-2xl">
  <div class="flex justify-between items-center border-b pb-4 mb-6">
    <h2 class="text-xl font-bold text-gray-800">
      {{ data ? 'Staff Details' : 'Register New Barangay Staff' }}
    </h2>
    <button (click)="onCancel()" class="text-gray-400 hover:text-gray-600">
      <span class="material-icons">close</span>
    </button>
  </div>

  <form [formGroup]="staffForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-1">First Name *</label>
        <input type="text" formControlName="firstName" 
               class="p-2 border rounded shadow-sm focus:ring-2 focus:ring-blue-500 outline-none"
               [ngClass]="{'border-red-500': staffForm.get('firstName')?.invalid && staffForm.get('firstName')?.touched}">
      </div>

      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-1">Middle Name</label>
        <input type="text" formControlName="middleName" 
               class="p-2 border rounded shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-1">Last Name *</label>
        <input type="text" formControlName="lastName" 
               class="p-2 border rounded shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-1">Position *</label>
        <select formControlName="position" 
                class="p-2 border rounded shadow-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
          <option value="">Select Position</option>
          <option value="Captain">Barangay Captain</option>
          <option value="Secretary">Secretary</option>
          <option value="Treasurer">Treasurer</option>
          <option value="Kagawad">Kagawad</option>
          <option value="SK Chairperson">SK Chairperson</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-1">Birth Date *</label>
        <input type="date" formControlName="birthDate" 
               class="p-2 border rounded shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
      </div>

      <div class="flex flex-col">
        <label class="text-sm font-semibold text-gray-700 mb-1">Email Address</label>
        <input type="email" formControlName="email" 
               placeholder="staff@barangay.gov.ph"
               class="p-2 border rounded shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
      </div>
    </div>

    <div class="flex justify-end space-x-3 mt-8 pt-4 border-t">
      <button type="button" (click)="onCancel()" 
              class="px-4 py-2 text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-md font-medium transition">
        {{ staffForm.disabled ? 'Close' : 'Cancel' }}
      </button>
      
      <button *ngIf="!staffForm.disabled"
              type="submit" [disabled]="staffForm.invalid || loading"
              class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md font-medium shadow-sm transition disabled:opacity-50 disabled:cursor-not-allowed">
        {{ loading ? 'Saving...' : (data ? 'Update Staff' : 'Save Staff') }}
      </button>

      <button *ngIf="staffForm.disabled"
              type="button" (click)="onEnableEdit()"
              class="px-6 py-2 bg-yellow-500 hover:bg-yellow-600 text-white rounded-md font-medium shadow-sm transition">
        Edit Information
      </button>
    </div>
  </form>
</div>
