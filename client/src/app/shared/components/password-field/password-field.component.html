<div class="space-y-2">

  <label class="block text-sm font-semibold text-slate-700">
    {{ label }}
  </label>

  <div class="relative">
    <input
      [type]="showPassword ? 'text' : 'password'"
      [value]="value"
      (input)="updateValue($any($event.target).value); checkRules($any($event.target).value)"
      (blur)="onTouched()"
      [disabled]="disabled"
      placeholder="••••••••"
      class="w-full px-4 py-2 pr-10 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">

    <button
      type="button"
      (click)="toggleVisibility()"
      class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
      <mat-icon class="text-base">
        {{ showPassword ? 'visibility' : 'visibility_off' }}
      </mat-icon>
    </button>
  </div>

  <div class="mt-2">
    <div class="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
      <div
        class="h-full transition-all duration-300"
        [class]="strengthColor"
        [style.width.%]="strength * 25">
      </div>
    </div>
    <p class="text-xs mt-1 text-slate-500">
      Strength: <span class="font-semibold">{{ strengthLabel }}</span>
    </p>
  </div>

  <ul class="text-xs space-y-1 mt-2">
    <li [class.text-green-600]="rules.length">✔ At least 8 characters</li>
    <li [class.text-green-600]="rules.uppercase">✔ At least 1 uppercase letter</li>
    <li [class.text-green-600]="rules.number">✔ At least 1 number</li>
    <li [class.text-green-600]="rules.special">✔ At least 1 special character</li>
  </ul>

</div>
