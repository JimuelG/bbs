<div class="min-h-screen bg-slate-50 overflow-hidden">

  @if(busyService.loading) {
    <mat-progress-bar mode="indeterminate" class="fixed top-0 left-0 w-full z-[70]"></mat-progress-bar>
  }

  <header class="fixed top-0 left-0 w-full h-16 z-50 bg-white border-b border-slate-200 shadow-sm">
    <div class="h-full px-3 sm:px-4 md:px-6 flex items-center justify-between">

      <div class="flex items-center min-w-0">
        <button
          mat-icon-button
          (click)="toggleSidebar()"
          class="mr-2 shrink-0 text-slate-600 hover:bg-slate-100 transition-colors">
          <mat-icon>menu</mat-icon>
        </button>

        <div class="flex items-center gap-2 min-w-0">
          <div class="w-8 h-8 bg-amber-800 rounded-lg flex items-center justify-center shrink-0">
            <mat-icon class="text-white text-sm">admin_panel_settings</mat-icon>
          </div>

          <div class="min-w-0">
            <h1 class="text-base sm:text-lg md:text-xl font-bold text-slate-800 tracking-tight truncate">
              Admin Dashboard
            </h1>
            <p class="hidden sm:block text-xs text-slate-400 truncate">
              Barangay management panel
            </p>
          </div>
        </div>
      </div>

      <div class="flex items-center gap-2 sm:gap-4 shrink-0">
        <button mat-icon-button class="text-slate-400">
          <mat-icon>notifications</mat-icon>
        </button>

        <div class="w-8 h-8 rounded-full bg-slate-200 border border-slate-300 shrink-0"></div>
      </div>

    </div>
  </header>

  <div class="pt-16 h-screen flex overflow-hidden relative">

    @if (isMobile() && isSidebarVisible()) {
      <div
        (click)="toggleSidebar()"
        class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 md:hidden">
      </div>
    }

    <aside
      class="
        fixed md:relative
        top-16 md:top-0
        left-0
        h-[calc(100vh-4rem)] md:h-full
        w-64
        bg-amber-800 text-white
        shadow-2xl md:shadow-none
        border-r border-amber-900
        z-50 md:z-20
        flex flex-col justify-between

        overflow-hidden
        shrink-0
        transform-gpu transition-transform md:transition-[width] duration-300 ease-in-out
      "
      [ngClass]="{
        'translate-x-0 md:w-64': isSidebarVisible(),
        '-translate-x-full md:translate-x-0 md:w-0': !isSidebarVisible()
      }"
    >

      <div class="w-64 overflow-y-auto">
        <div class="p-3">
          <div class="px-3 py-4 mb-2">
            <p class="text-[10px] uppercase tracking-[0.2em] text-amber-200/60 font-bold">
              Main Navigation
            </p>
          </div>

          <mat-list role="list" class="bg-transparent space-y-1">
            @for (link of navLinks; track link.path) {
              <mat-list-item
                [routerLink]="link.path"
                routerLinkActive="bg-amber-700 shadow-inner border-l-4 border-amber-200"
                (click)="isMobile() ? isSidebarVisible.set(false) : null"
                class="rounded-lg h-auto mb-1 group transition-all duration-200">

                <a class="flex items-center p-3 w-full text-white no-underline group-hover:translate-x-1 transition-transform">
                  <mat-icon class="mr-3 opacity-80 group-hover:opacity-100 shrink-0">
                    {{link.icon}}
                  </mat-icon>
                  <span class="text-sm font-medium tracking-wide truncate">
                    {{link.label}}
                  </span>
                </a>

              </mat-list-item>
            }
          </mat-list>
        </div>
      </div>

      <div class="p-4 border-t border-amber-700/50 w-64 bg-amber-900/20 shrink-0">
        <div class="flex flex-col items-center text-center">
          <p class="text-[10px] text-amber-200/50 uppercase tracking-widest font-semibold">
            Barangay System
          </p>
          <p class="text-[9px] text-amber-200/40">
            Version 1.0.4-stable
          </p>
        </div>
      </div>

    </aside>

    <main
      class="
        flex-1
        min-w-0
        h-full
        overflow-y-auto
        bg-slate-50
        transition-all duration-300 ease-in-out
      "
    >
      <div class="w-full max-w-7xl mx-auto p-4 sm:p-5 md:p-8">
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>
</div>
