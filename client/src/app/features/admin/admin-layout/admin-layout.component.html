<div class="flex flex-col h-screen overflow-hidden bg-slate-50">

    @if(busyService.loading) {
        <mat-progress-bar mode="indeterminate" class="absolute top-0 left-0 w-full z-50"></mat-progress-bar>
    }

    <header class="h-16 bg-white shadow-sm flex items-center justify-between px-4 fixed top-0 left-0 w-full z-30 border-b border-slate-200">
        <div class="flex items-center">
            <button mat-icon-button (click)="toggleSidebar()" class="mr-2 text-slate-600 hover:bg-slate-100 transition-colors">
                <mat-icon>menu</mat-icon>
            </button>
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-amber-800 rounded flex items-center justify-center">
                    <mat-icon class="text-white text-sm">admin_panel_settings</mat-icon>
                </div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">Admin Dashboard</h1>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <button mat-icon-button class="text-slate-400"><mat-icon>notifications</mat-icon></button>
            <div class="w-8 h-8 rounded-full bg-slate-200 border border-slate-300"></div>
        </div>
    </header>

    <div class="flex flex-1 mt-16 overflow-hidden relative">
        
        @if (isMobile() && isSidebarVisible()) {
            <div 
                (click)="toggleSidebar()" 
                class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 transition-opacity duration-300">
            </div>
        }

        <aside 
            [class.w-64]="isSidebarVisible()" 
            [class.w-0]="!isSidebarVisible()"
            [class.-translate-x-full]="isMobile() && !isSidebarVisible()"
            class="fixed md:relative flex flex-col justify-between bg-amber-800 text-white shadow-2xl transition-all duration-300 ease-in-out h-full shrink-0 z-50 overflow-hidden border-r border-amber-900"
        >
            <div class="p-3 w-64"> 
                <div class="px-3 py-4 mb-2">
                    <p class="text-[10px] uppercase tracking-[0.2em] text-amber-200/50 font-bold">Main Navigation</p>
                </div>

                <mat-list role="list" class="bg-transparent space-y-1">
                    @for (link of navLinks; track link.path) {
                        <mat-list-item 
                            [routerLink]="link.path" 
                            routerLinkActive="bg-amber-700 shadow-inner border-l-4 border-amber-200" 
                            (click)="isMobile() ? isSidebarVisible.set(false) : null"
                            class="rounded-lg h-auto mb-1 group transition-all duration-200"
                        >
                            <a class="flex items-center p-3 w-full text-white no-underline group-hover:translate-x-1 transition-transform">
                                <mat-icon class="mr-3 opacity-80 group-hover:opacity-100">{{link.icon}}</mat-icon>
                                <span class="text-sm font-medium tracking-wide">{{link.label}}</span>
                            </a>
                        </mat-list-item>
                    }
                </mat-list>
            </div>
            
            <div class="p-4 border-t border-amber-700/50 w-64 bg-amber-900/20">
                <div class="flex flex-col items-center">
                    <p class="text-[10px] text-amber-200/40 uppercase tracking-widest font-semibold">Barangay System</p>
                    <p class="text-[9px] text-amber-200/30">Version 1.0.4-stable</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 transition-all duration-300 ease-in-out w-full bg-slate-50 relative">
            <div class="max-w-7xl mx-auto">
                <router-outlet></router-outlet>
            </div>
        </main>

    </div>
</div>
