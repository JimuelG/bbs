<div class="max-w-3xl mx-auto p-6 md:p-8">
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Report a Concern</h1>
    <p class="text-slate-500 text-sm mt-1">Submit issues, request assistance, or report incidents directly to the barangay office.</p>
  </div>

  <form [formGroup]="concernForm" (ngSubmit)="onSubmit()" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
    
    <div class="p-6 md:p-8 space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">Issue Title</label>
          <input type="text" formControlName="title" placeholder="e.g., Broken Streetlight" 
                 class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
          @if (concernForm.get('title')?.touched && concernForm.get('title')?.invalid) {
            <span class="text-xs text-red-500 mt-1 block">Title is required.</span>
          }
        </div>
        
        <div>
          <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">Category</label>
          <select formControlName="type" 
                  class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all appearance-none">
            <option value="" disabled>Select a category...</option>
            <option value="Complaint">Complaint</option>
            <option value="Assistance">Assistance Request</option>
            <option value="ReportIncident">Report Incident</option>
            <option value="Infrastructure">Infrastructure Issue</option>
            <option value="Suggestion">Suggestion</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">Purok</label>
          <input type="text" formControlName="purok" placeholder="e.g., Purok 4" 
                 class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>
        <div>
          <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">Specific Location</label>
          <input type="text" formControlName="incidentLocation" placeholder="e.g., Near the basketball court" 
                 class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>
      </div>

      <div>
        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">Detailed Description</label>
        <textarea formControlName="description" rows="4" placeholder="Please describe the issue in detail..."
                  class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-y"></textarea>
      </div>

      <div>
        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">Attach Evidence (Optional)</label>
        
        @if (imagePreview) {
          <div class="relative inline-block border-2 border-slate-200 rounded-xl overflow-hidden group">
            <img [src]="imagePreview" class="h-40 w-auto object-contain bg-slate-50">
            <button type="button" (click)="removeImage()" 
                    class="absolute top-2 right-2 h-8 w-8 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center shadow-lg transition-all scale-90 opacity-0 group-hover:opacity-100 group-hover:scale-100">
              <mat-icon class="text-sm">close</mat-icon>
            </button>
          </div>
        } @else {
          <div class="w-full border-2 border-dashed border-slate-300 rounded-xl p-8 text-center hover:bg-slate-50 transition-colors cursor-pointer"
               (click)="fileInput.click()">
            <mat-icon class="text-slate-400 text-4xl mb-2">add_a_photo</mat-icon>
            <p class="text-sm font-semibold text-slate-600">Click to upload a photo</p>
            <p class="text-xs text-slate-400 mt-1">JPG, PNG up to 5MB</p>
          </div>
        }
        <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/png, image/jpeg" class="hidden">
      </div>
    </div>

    <div class="px-6 md:px-8 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
      <button type="button" routerLink="/resident/dashboard" class="px-5 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-200 rounded-xl transition-colors">
        Cancel
      </button>
      <button type="submit" [disabled]="loading" 
              class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white text-sm font-bold rounded-xl shadow-md transition-all flex items-center gap-2">
        @if (loading) {
          <mat-icon class="animate-spin text-sm">refresh</mat-icon>
          Submitting...
        } @else {
          <mat-icon class="text-sm">send</mat-icon>
          Submit Report
        }
      </button>
    </div>

  </form>
</div>
