<div class="max-w-4xl mx-auto p-6">
  <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
    
    <div class="bg-emerald-600 p-6 text-white text-center">
      <h2 class="text-2xl font-bold italic uppercase tracking-wider">Barangay Clearance Application</h2>
      <p class="text-emerald-100 text-sm mt-1">Please provide accurate information as per your valid ID.</p>
    </div>

    <form [formGroup]="certificateForm" (ngSubmit)="onSubmit()" class="p-8 space-y-6">
      
      <div>
        <h3 class="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2">
          <mat-icon class="text-emerald-600">person</mat-icon> Personal Details
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          
          <div class="flex flex-col">
            <label class="text-sm font-medium text-slate-600 mb-1">Full Name (Last, First, M.I.)</label>
            <input type="text" formControlName="fullName" class="form-input rounded-lg border-slate-200 focus:ring-emerald-500 focus:border-emerald-500" placeholder="e.g. DELA CRUZ, JUAN P.">
          </div>

          <div class="flex flex-col">
            <label class="text-sm font-medium text-slate-600 mb-1">Birth Date</label>
            <input type="date" formControlName="birthDate" class="form-input rounded-lg border-slate-200 focus:ring-emerald-500 focus:border-emerald-500">
          </div>

          <div class="flex flex-col">
            <label class="text-sm font-medium text-slate-600 mb-1">Civil Status</label>
            <select formControlName="civilStatus" class="form-select rounded-lg border-slate-200">
              <option value="Single">Single</option>
              <option value="Married">Married</option>
              <option value="Widowed">Widowed</option>
              <option value="Separated">Separated</option>
            </select>
          </div>

          <!-- <div class="flex flex-col">
            <label class="text-sm font-medium text-slate-600 mb-1">Certificate Type</label>
            <select formControlName="certificateType" class="form-select rounded-lg border-slate-200">
              <option [value]="0">Barangay Clearance</option>
              <option [value]="1">Indigency</option>
              <option [value]="2">Residency</option>
              <option [value]="3">First Time Job Seeker</option>
            </select>
          </div> -->
        </div>
      </div>

      <hr class="border-slate-100">

      <div>
        <h3 class="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2">
          <mat-icon class="text-emerald-600">home</mat-icon> Residency Information
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="md:col-span-2 flex flex-col">
            <label class="text-sm font-medium text-slate-600 mb-1">Complete Address</label>
            <input type="text" formControlName="address" class="form-input rounded-lg border-slate-200" placeholder="House No. / Street">
          </div>

          <div class="flex flex-col">
            <label class="text-sm font-medium text-slate-600 mb-1">Purok</label>
            <select formControlName="purok" class="form-select rounded-lg border-slate-200">
              <option value="Purok 1">Purok 1</option>
              <option value="Purok 2">Purok 2</option>
              <option value="Purok 3">Purok 3</option>
              </select>
          </div>

          <div class="flex flex-col">
            <label class="text-sm font-medium text-slate-600 mb-1">Years of Stay</label>
            <input type="text" formControlName="stayDuration" class="form-input rounded-lg border-slate-200" placeholder="e.g. 10 Years">
          </div>
        </div>
      </div>

      <hr class="border-slate-100">

      <div>
        <h3 class="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2">
          <mat-icon class="text-emerald-600">description</mat-icon> Application Purpose
        </h3>
        <div class="space-y-4">
          <div class="flex flex-col">
            <label class="text-sm font-medium text-slate-600 mb-1">Purpose of Application</label>
            <textarea formControlName="purpose" rows="3" class="form-textarea rounded-lg border-slate-200" placeholder="e.g. Employment, Scholarship, Local ID"></textarea>
          </div>
          
          <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-200">
            <div>
              <p class="text-sm font-bold text-slate-700 uppercase">Total Fee</p>
              <p class="text-xs text-slate-500 italic">Pay this amount at the Barangay Treasurer's office.</p>
            </div>
            <div class="text-2xl font-black text-emerald-700">
              ₱ {{ certificateForm.get('fee')?.value | number:'1.2-2' }}
            </div>
          </div>
        </div>
      </div>

      <div class="flex gap-4 pt-4">
        <button type="button" class="flex-1 px-6 py-3 border border-slate-200 text-slate-600 rounded-xl font-semibold hover:bg-slate-50 transition-all">
          Clear Form
        </button>
        <button type="submit" [disabled]="certificateForm.invalid" 
          class="flex-1 px-6 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-700 disabled:bg-slate-300 disabled:shadow-none transition-all">
          Submit Application
        </button>
      </div>

    </form>
  </div>
</div>
