<div class="max-w-3xl mx-auto p-4 md:p-8">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-900">Request Certificates</h1>
    <p class="text-gray-600">Select the type of document you need from the list below.</p>
  </div>

  <div class="space-y-3">
    @for (cert of certificates; track cert.type; let i = $index) {
      <div class="bg-white border border-slate-100 rounded-xl mb-3 overflow-hidden">
        <button 
          type="button"
          (click)="toggleAccordion(i)"
          class="w-full px-5 py-4 flex justify-between items-center text-left">
          <div>
            <h3 class="font-bold text-slate-800">{{ cert.name }}</h3>
          </div>

          <span>{{ cert.isOpen ? '-' : '+' }}</span>
        </button>

        @if (cert.isOpen) {
          <div class="px-5 pb-5 text-sm text-slate-500">
            <p>{{ cert.description }}</p>

            <button 
              type="button"
              (click)="onRequest(cert)"
              class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold">
              Request Certificate
            </button>
          </div>
        }
      </div>
    } @empty {
      <div class="p-10 text-center border-2 border-dashed border-gray-200 rounded-xl">
        <p class="text-gray-500">No certificates available at this time.</p>
      </div>
    }
  </div>
</div>
